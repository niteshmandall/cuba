name: Run Admin Script

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      script_path:
        description: 'Path to Script (e.g. scripts/tickets/example/rename_school.py)'
        required: true
        type: string
      arguments:
        description: 'Optional arguments (e.g. --schoolId=123 --newName="New Name")'
        required: false
        type: string

jobs:
  execute-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4



      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install app dependencies
        run: |
          if [ -f "scripts/tickets/requirements.txt" ]; then pip install -r scripts/tickets/requirements.txt; fi

      - name: Set Environment Variables and Run Script
        env:
          PYTHONUNBUFFERED: "1"
          PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PROD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          DEV_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          DEV_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Starting script execution for environment: ${{ github.event.inputs.environment }}"
          echo "Script: ${{ github.event.inputs.script_path }}"
          
          if [ "${{ github.event.inputs.environment }}" == "prod" ]; then
            export SUPABASE_URL="$PROD_SUPABASE_URL"
            export SUPABASE_SERVICE_ROLE_KEY="$PROD_SUPABASE_SERVICE_ROLE_KEY"
          else
            export SUPABASE_URL="$DEV_SUPABASE_URL"
            export SUPABASE_SERVICE_ROLE_KEY="$DEV_SUPABASE_SERVICE_ROLE_KEY"
          fi
          
          python -u ${{ github.event.inputs.script_path }} ${{ github.event.inputs.arguments }}
          
          echo "Script execution completed."
